# ============================================================
#  9平台语气风格规则
#  [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
# ============================================================

# ---------- C组：社交平台 ----------

小红书:
  group: "C"
  tone: "轻松、好奇、有冲击力"
  taboo: "不要长篇大论"
  length: "500-800字 + 3-6图"
  frequency: "5-10篇/周"
  format: "图文（短图文 + 钩子标题）"
  tags_count: 10
  title_max_length: 20
  post_processing:
    - cover_generation
    - card_rendering
  title_formula:
    - "数字+反常识：《这个工具让我效率提升300%》"
    - "疑问钩子：《AI写的文案，你真的分得出来吗？》"
    - "情绪冲击：《2026年最离谱的AI工具体验》"
  body_structure:
    - "第1段：钩子（制造好奇心，1-2句话）"
    - "第2段：场景描述（我用XX工具做了什么）"
    - "第3段：具体例子（截图+说明）"
    - "第4段：引导互动"
    - "末尾：一句话介绍+搜索引导"
  example: "「我用AI工具一天做完了别人一周的工作」"
  image_style:
    default: "为以下内容生成配图，美观精致，漫画风格，生动活泼，色调温暖明亮，避免AI蓝AI紫，输出图片中文字为中文，中文字体要正确："
    presets:
      - name: "漫画风"
        prompt: "为以下内容生成配图，美观精致，漫画风格，生动活泼，色调温暖明亮，避免AI蓝AI紫，输出图片中文字为中文，中文字体要正确："
      - name: "极简风"
        prompt: "为以下内容生成配图，极简主义，留白大方，线条简洁，色调素雅，避免AI蓝AI紫："
      - name: "摄影风"
        prompt: "为以下内容生成配图，高质量摄影风格，光影细腻，构图考究，色调自然真实："
      - name: "信息图"
        prompt: "为以下内容生成信息图，逻辑严密阐述清晰，一目了然，让初中生也能看懂，配色明快，中文字体正确："

即刻:
  group: "C"
  tone: "观点鲜明、真实随性、朋友间聊天"
  taboo: "不要太正式"
  length: "200-1000字（无硬性上限，话题有深度可以写长）"
  frequency: "5-10条/周"
  format: "短文本/中文本"
  example: "「发现一个AI工具，10分钟自动生成一周的社媒内容 😂」"
  image_style:
    default: "为以下内容生成配图，简洁明快，插画风格，色彩鲜明，适合社交媒体，避免AI蓝AI紫："
    presets:
      - name: "插画风"
        prompt: "为以下内容生成配图，简洁明快，插画风格，色彩鲜明，适合社交媒体，避免AI蓝AI紫："
      - name: "漫画风"
        prompt: "为以下内容生成配图，漫画风格，生动活泼，色调温暖，中文字体正确："

# ---------- A组：长图文 ----------

公众号:
  group: "A"
  tone: "专业但亲切，讲故事，深度分析"
  taboo: "不要太学术，不要浅尝辄止"
  length: "1500-2500字"
  frequency: "5-10篇/周"
  format: "长图文"
  sync_to:
    - "百家号"
    - "今日头条"
  example: "「我做了一个自动化内容流水线，这是第X天发生的事」"
  image_style:
    default: "为以下内容生成配图，专业大气，商务风格，配色沉稳，适合长文配图，中文字体正确："
    presets:
      - name: "商务风"
        prompt: "为以下内容生成配图，专业大气，商务风格，配色沉稳，适合长文配图，中文字体正确："
      - name: "信息图"
        prompt: "为以下内容生成信息图，结构清晰，数据可视化，配色专业，中文字体正确："
      - name: "故事风"
        prompt: "为以下内容生成配图，叙事感强，温暖色调，有人物场景，中文字体正确："

百家号:
  group: "A"
  tone: "同公众号，标题更抓眼球"
  taboo: "避免过度标题党"
  inherits: "公众号"
  title_style: "加数字钩子"

今日头条:
  group: "A"
  tone: "同公众号"
  taboo: "避免标题党"
  inherits: "公众号"
  title_style: "加数字钩子"

知乎:
  group: "A"
  tone: "专业、深度、有理有据"
  taboo: "避免绝对化表达，不用'首先其次最后'"
  length: "1500-3000字"
  frequency: "2-3篇/周"
  format: "深度长文/专栏/回答"
  must_have:
    - "亲身经历至少1段"
    - "具体数据/案例支撑"
    - "不完美表达（增加真实感）"
  title_formula:
    - "深度分析型：[领域]的[数量]个真相，[结果]"
    - "反常识型：[普遍认知]可能是错的"
    - "经验分享型：我在[领域]工作[时间]，总结出这些经验"
  recommended_styles: ["A", "C", "G"]
  example: "「我做了一年AI自动化，这5个坑你一定会踩」"
  image_style:
    default: "为以下内容生成配图，专业深度，信息图风格，结构化排版，深色系，中文字体正确："
    presets:
      - name: "信息图"
        prompt: "为以下内容生成配图，专业深度，信息图风格，结构化排版，深色系，中文字体正确："
      - name: "数据图"
        prompt: "为以下内容生成数据可视化配图，图表清晰，配色沉稳专业，中文字体正确："
      - name: "思维导图"
        prompt: "为以下内容生成思维导图风格配图，层次分明，逻辑清晰，配色简洁，中文字体正确："

# ---------- B组：技术社区 ----------

linuxdo:
  group: "B"
  tone: "技术向、真诚、开发者第一人称"
  taboo: "绝对禁止营销感。不说'快来体验'，说'分享我的实现思路'"
  length: "800-1500字"
  frequency: "1帖/周 + 互动5次/周"
  format: "技术长文"
  cold_start: "前2周只互动不发帖"
  contribution_ratio: "贡献:自推 >= 10:1"
  body_structure:
    - "第1段：背景和动机（为什么做这个，技术上的思考）"
    - "第2段：技术选型和实现（架构、难点、取舍）"
    - "第3段：遇到的问题和解决方案"
    - "第4段：当前状态和下一步计划"
    - "末尾：欢迎交流（不是'欢迎使用'）"
  example: "「最近在做一个自动化内容管道，聊聊技术选型和踩的坑」"
  image_style:
    default: "为以下内容生成技术架构图风格配图，极简线条，深色背景，代码感，英文标注："
    presets:
      - name: "架构图"
        prompt: "为以下内容生成技术架构图风格配图，极简线条，深色背景，代码感，英文标注："
      - name: "流程图"
        prompt: "为以下内容生成流程图风格配图，步骤清晰，箭头连接，配色简洁："

GitHub:
  group: "B"
  tone: "技术文档风格，严谨"
  taboo: "不推销，只分享技术"
  frequency: "按周节奏"
  format: "Discussion/PR/Issue"
  weekly_rhythm:
    周一: "潜水阅读"
    周二: "有价值回复"
    周三: "深度回复"
    周四: "内容发布（每2周1次）"
    周五: "关系维护（Star repo + 提PR）"

# ---------- D组：国际长文 ----------

Medium:
  group: "D"
  tone: "英文、深度、个人视角+专业洞察"
  taboo: "不要翻译腔英文，不要 'In today's rapidly evolving...'"
  length: "1500-3000 words (6-12 min read)"
  frequency: "1-2篇/周"
  format: "英文长文"
  must_have:
    - "Subtitle（副标题）"
    - "Featured Image"
    - "5个Tags（第一个最重要）"
  title_formula:
    - "How I [achieved result] in [timeframe]"
    - "Why [common belief] is Wrong"
    - "I [did something] for [time]. Here's What Happened."
  recommended_styles: ["A", "C", "J"]
  example: "\"How I Built an AI Content Pipeline in 30 Days — and What Broke Along the Way\""
  image_style:
    default: "Generate a professional editorial illustration for the following content, clean composition, warm muted tones, minimalist style, large whitespace:"
    presets:
      - name: "Editorial"
        prompt: "Generate a professional editorial illustration for the following content, clean composition, warm muted tones, minimalist style, large whitespace:"
      - name: "Abstract"
        prompt: "Generate an abstract conceptual illustration for the following content, bold geometric shapes, modern color palette, artistic:"
      - name: "Technical"
        prompt: "Generate a technical diagram illustration for the following content, clean lines, structured layout, professional color scheme:"

Quora:
  group: "D"
  tone: "英文、专业、直接回答+经验支撑"
  taboo: "不要绕弯子，不要CTA"
  length: "500-2000 words"
  frequency: "2-3回答/周"
  format: "英文问答"
  answer_structure:
    - "Short answer: [直接结论]"
    - "Let me explain why..."
    - "分点说明 + 案例"
    - "简短总结"
  recommended_styles: ["C", "E", "J"]
  example: "\"Short answer: Yes, but not how most people think. Let me explain...\""
  image_style:
    default: "Generate a clear informative illustration for the following content, professional style, structured layout, easy to understand:"
    presets:
      - name: "Informative"
        prompt: "Generate a clear informative illustration for the following content, professional style, structured layout, easy to understand:"
      - name: "Conceptual"
        prompt: "Generate a conceptual illustration for the following content, metaphorical imagery, thought-provoking, clean design:"

# ---------- E组：国际社交 ----------

X:
  group: "E"
  tone: "英文、简洁、builder视角"
  taboo: "不要中式英语"
  length: "280字符（含标签）"
  frequency: "5-10推/周 + 每天回复"
  format: "英文推文/Thread"
  post_time: "北京时间10:40-11:00（对应美西19:00-22:00）"
  tags_count: 3
  interaction:
    - "每天回复3-5条相关推文"
    - "每周至少1次Quote Tweet行业热门推文"
    - "回复不是广告，留有价值的见解"
  recommended_styles: ["C", "E", "H"]
  example: "\"Built an automation pipeline for content creation. Day X update.\""
  image_style:
    default: "Generate a bold eye-catching graphic for the following content, high contrast, single focal point, modern design, social media optimized:"
    presets:
      - name: "Bold"
        prompt: "Generate a bold eye-catching graphic for the following content, high contrast, single focal point, modern design, social media optimized:"
      - name: "Minimal"
        prompt: "Generate a minimal clean graphic for the following content, simple composition, muted tones, elegant:"

Reddit:
  group: "E"
  tone: "英文、真实、社区感、可讨论"
  taboo: "零营销味，像社区成员不是品牌方"
  length: "200-1500 words（灵活）"
  frequency: "1-2帖/周 + 互动"
  format: "英文帖子/评论"
  culture:
    - "真实性第一，Reddit讨厌虚假"
    - "承认不足，邀请补充"
    - "遵守subreddit规则"
  title_formula:
    - "I [did something] and [result]. AMA"
    - "Just discovered [tool]. Mind = blown."
    - "What's the best [thing] for [purpose]?"
  recommended_styles: ["A", "H", "I"]
  example: "\"I built an AI content pipeline. Here's what actually worked (and what didn't).\""
  image_style:
    default: "Generate a casual authentic illustration for the following content, community feel, relatable, warm tones, not corporate:"
    presets:
      - name: "Casual"
        prompt: "Generate a casual authentic illustration for the following content, community feel, relatable, warm tones, not corporate:"
      - name: "Meme-style"
        prompt: "Generate a meme-style illustration for the following content, humorous, relatable, internet culture aesthetic:"

# ---------- F组：私域 ----------

朋友圈:
  group: "E"
  tone: "真实、个人化、不像广告"
  taboo: "3条里最多1条直接推广"
  length: "100-500字（轻量100-200，有料200-500）"
  frequency: "工作日2条 + 周六1条"
  format: "短文+配图"
  weekly_templates:
    周一: "产品动态/工具分享"
    周二: "行业观察/趋势思考"
    周三: "轻松趣味/AI趣事"
    周四: "开发者视角/技术思考"
    周五: "互动型/小测试"
    周六: "轻松日常"
  image_style:
    default: "为以下内容生成配图，真实生活感，手机随手拍风格，自然光，温暖色调，不像广告："
    presets:
      - name: "生活感"
        prompt: "为以下内容生成配图，真实生活感，手机随手拍风格，自然光，温暖色调，不像广告："
      - name: "文艺风"
        prompt: "为以下内容生成配图，文艺清新，杂志排版感，留白优雅，中文字体正确："

# ============================================================
#  配图命名规范 (from CAT5_Brain)
#  [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
# ============================================================

image_naming:
  cover: "cover-{date}-{title_slug}.png"
  inline: "inline-{date}-{description_slug}.png"
  card: "card-{date}-{title_slug}-{page}.png"
  screenshot: "{basename}-微信截图-{index}.png"
