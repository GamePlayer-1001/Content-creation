# ============================================================
#  9平台语气风格规则
#  [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
# ============================================================

# ---------- C组：社交平台 ----------

小红书:
  group: "C"
  tone: "轻松、好奇、有冲击力"
  taboo: "不要长篇大论"
  length: "500-800字 + 3-6图"
  frequency: "5-10篇/周"
  format: "图文（短图文 + 钩子标题）"
  tags_count: 10
  title_max_length: 20
  post_processing:
    - cover_generation
    - card_rendering
  title_formula:
    - "数字+反常识：《这个工具让我效率提升300%》"
    - "疑问钩子：《AI写的文案，你真的分得出来吗？》"
    - "情绪冲击：《2026年最离谱的AI工具体验》"
  body_structure:
    - "第1段：钩子（制造好奇心，1-2句话）"
    - "第2段：场景描述（我用XX工具做了什么）"
    - "第3段：具体例子（截图+说明）"
    - "第4段：引导互动"
    - "末尾：一句话介绍+搜索引导"
  example: "「我用AI工具一天做完了别人一周的工作」"

即刻:
  group: "C"
  tone: "简短、观点鲜明、像发朋友圈"
  taboo: "不要太正式"
  length: "100-300字"
  frequency: "5-10条/周"
  format: "短文本"
  example: "「发现一个AI工具，10分钟自动生成一周的社媒内容 😂」"

# ---------- A组：长图文同步 ----------

公众号:
  group: "A"
  tone: "专业但亲切，讲故事"
  taboo: "不要太学术"
  length: "800-1500字"
  frequency: "5-10篇/周"
  format: "长图文"
  sync_to:
    - "百家号"
    - "今日头条"
  example: "「我做了一个自动化内容流水线，这是第X天发生的事」"

百家号:
  group: "A"
  tone: "同公众号，标题更抓眼球"
  taboo: "避免过度标题党"
  inherits: "公众号"
  title_style: "加数字钩子"

今日头条:
  group: "A"
  tone: "同公众号"
  taboo: "避免标题党"
  inherits: "公众号"
  title_style: "加数字钩子"

# ---------- B组：技术社区 ----------

linuxdo:
  group: "B"
  tone: "技术向、真诚、开发者第一人称"
  taboo: "绝对禁止营销感。不说'快来体验'，说'分享我的实现思路'"
  length: "800-1500字"
  frequency: "1帖/周 + 互动5次/周"
  format: "技术长文"
  cold_start: "前2周只互动不发帖"
  contribution_ratio: "贡献:自推 >= 10:1"
  body_structure:
    - "第1段：背景和动机（为什么做这个，技术上的思考）"
    - "第2段：技术选型和实现（架构、难点、取舍）"
    - "第3段：遇到的问题和解决方案"
    - "第4段：当前状态和下一步计划"
    - "末尾：欢迎交流（不是'欢迎使用'）"
  example: "「最近在做一个自动化内容管道，聊聊技术选型和踩的坑」"

GitHub:
  group: "B"
  tone: "技术文档风格，严谨"
  taboo: "不推销，只分享技术"
  frequency: "按周节奏"
  format: "Discussion/PR/Issue"
  weekly_rhythm:
    周一: "潜水阅读"
    周二: "有价值回复"
    周三: "深度回复"
    周四: "内容发布（每2周1次）"
    周五: "关系维护（Star repo + 提PR）"

# ---------- D组：国际化 ----------

X:
  group: "D"
  tone: "英文、简洁、builder视角"
  taboo: "不要中式英语"
  length: "280字符（含标签）"
  frequency: "5-10推/周 + 每天回复"
  format: "英文推文/Thread"
  post_time: "北京时间10:40-11:00（对应美西19:00-22:00）"
  tags_count: 3
  interaction:
    - "每天回复3-5条相关推文"
    - "每周至少1次Quote Tweet行业热门推文"
    - "回复不是广告，留有价值的见解"
  example: "\"Built an automation pipeline for content creation. Day X update.\""

# ---------- E组：私域 ----------

朋友圈:
  group: "E"
  tone: "真实、个人化、不像广告"
  taboo: "3条里最多1条直接推广"
  frequency: "工作日2条 + 周六1条"
  format: "短文+配图"
  weekly_templates:
    周一: "产品动态/工具分享"
    周二: "行业观察/趋势思考"
    周三: "轻松趣味/AI趣事"
    周四: "开发者视角/技术思考"
    周五: "互动型/小测试"
    周六: "轻松日常"

# ============================================================
#  配图命名规范 (from CAT5_Brain)
#  [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
# ============================================================

image_naming:
  cover: "cover-{date}-{title_slug}.png"
  inline: "inline-{date}-{description_slug}.png"
  card: "card-{date}-{title_slug}-{page}.png"
  screenshot: "{basename}-微信截图-{index}.png"
