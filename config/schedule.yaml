# ============================================================
#  60天推广排期 + 日类型系统
#  [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
# ============================================================

# ---------- 起始日期 ----------
start_date: "2026-03-04"

# ---------- 阶段划分 ----------
phases:
  phase_0:
    name: "弹药准备期"
    day_range: [1, 3]
    focus: "搭建账号 + 填充平台内容 + 批量备稿"
    mindset: "闷头准备，不发一条推广"
    deliverables:
      - "9个平台账号全部就绪，形象统一"
      - "备稿池: 公众号6-8篇, 小红书6-8条, 即刻10-12条, X推文8-10条"

  phase_1:
    name: "冷启动期"
    day_range: [4, 30]
    focus: "按节奏持续出现，积累50-100种子用户"
    mindset: "接受无人问津，坚持节奏"
    milestones:
      小红书粉丝: "30-100"
      即刻关注者: "20-60"
      公众号粉丝: "15-50"
      X_followers: "15-50"
      微信好友: "30-80"
      注册用户: "20-80"

  phase_2:
    name: "放大期"
    day_range: [31, 60]
    focus: "聚焦有效渠道和内容类型，加倍投入"
    mindset: "小步放大，不贪"
    strategy: "Phase 1找到了什么有效，Phase 2就重复什么"
    milestones:
      小红书粉丝: "100-350"
      即刻关注者: "50-150"
      公众号粉丝: "50-150"
      X_followers: "40-150"
      微信好友: "60-180"
      注册用户: "50-200"

# ---------- 日类型系统 ----------
day_types:
  内容日:
    weekdays: [1, 2, 3, 4, 5]
    duration: "3.5-5h"
    core: "写母稿1-2篇 → 全平台分发 → 互动 → 私域"
    output: "1-2篇母稿 + 全渠道衍生内容"

  轻量日:
    weekdays: [6]
    duration: "1-2h"
    core: "朋友圈1条 + 回复评论 + 可选发1篇 + 私聊3-5人"
    output: "可选内容 + 维护动作"

  休息日:
    weekdays: [0]
    duration: "0.5h"
    core: "30min周复盘 + 朋友圈1条（可选）"
    output: "复盘报告"

# ---------- 内容日标准流程 ----------
content_day_flow:
  第1篇母稿:
    - { time: "09:00-09:35", task: "写核心长文/从备稿池取稿", cmd: "/母稿" }
    - { time: "09:35-09:45", task: "发公众号", cmd: "/公众号" }
    - { time: "09:45-09:55", task: "发百家号+今日头条", note: "公众号skill自动生成变体" }
    - { time: "09:55-10:20", task: "发小红书（提炼+配图+发布）", cmd: "/小红书" }
    - { time: "10:20-10:30", task: "发即刻", cmd: "/即刻" }
    - { time: "10:30-10:50", task: "发X/Twitter（翻译+发布）", cmd: "/X推文" }
    - { time: "10:50-11:10", task: "全平台互动（评热帖/回复动态）", note: "手动" }
  第2篇母稿_可选:
    - { time: "13:00-13:35", task: "写第2篇/从备稿池取稿", cmd: "/母稿" }
    - { time: "13:35-14:15", task: "全平台分发", cmd: "/全平台分发" }
  固定动作:
    - { time: "14:15-14:40", task: "linuxdo或GitHub专项", cmd: "/linuxdo 或 /GitHub" }
    - { time: "12:00-12:15", task: "朋友圈1条", cmd: "/朋友圈" }
    - { time: "20:00-20:15", task: "朋友圈1条（晚间）", cmd: "/朋友圈" }
    - { time: "20:15-20:30", task: "私聊/行业人脉", note: "手动" }

# ---------- 轻量日流程 ----------
light_day_flow:
  - { time: "上午任意", task: "可选：发1篇内容", note: "从备稿池取或写轻量内容" }
  - { time: "碎片时间", task: "朋友圈1条 + 回复本周评论" }
  - { time: "晚间", task: "集中私聊3-5人 + 行业人脉触达" }

# ---------- 执行纪律 ----------
rules:
  - "工作日3.5-5h，周六1-2h，超过说明流水线有问题"
  - "周日必须休息，30min复盘 + 可选1条朋友圈"
  - "备稿提前1周，保持备稿池5-7篇母稿存量"
  - "不看Day 4-17的数据，前两周数据没有参考价值"
  - "日更节奏不能断，周一到周五每天至少1篇"
  - "linuxdo零容忍营销感，前2周只互动不发帖"
  - "聚焦>全面，9个渠道有无效的果断降频或砍掉"
  - "30天没起色就换方向"
