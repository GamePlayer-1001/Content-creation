# ============================================================
#  合规规则库 — 来源：小红书社区规范 + 审核实战经验
#  适用平台：小红书、公众号、百家号、今日头条、即刻
#  [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
# ============================================================

# ==================== 一、敏感词黑名单 ====================
# 直接触发机器审核，严格禁止出现及其变体

blacklist:
  # --- 政治安全类（社区规范 2.1节）---
  political:
    - "颠覆国家"
    - "分裂国家"
    - "泄露国家秘密"
    - "煽动民族仇恨"
    - "民族歧视"
    - "邪教"
    - "封建迷信"
    - "恐怖主义"
    - "极端主义"

  # --- 迷信/玄学类（审核实战高频拒审）---
  superstition:
    - "占卜"
    - "算命"
    - "算卦"
    - "卜卦"
    - "问卦"
    - "求签"
    - "抽签"
    - "看相"
    - "面相"
    - "风水"
    - "法事"
    - "做法"
    - "通灵"
    - "附体"
    - "驱邪"
    - "符咒"
    - "开光"
    - "消灾"
    - "改命"
    - "渡劫"
    - "化解"
    - "补运"
    - "改运"
    - "转运"
    - "开运"
    - "旺运"
    - "招财"
    - "挡煞"
    - "破太岁"
    - "流年"
    - "咸池"
    - "线上法事"
    - "道场"
    - "做功德"

  # --- 商业导流类（社区规范 3.2节）---
  commercial:
    - "私信"
    - "加微信"
    - "加我"
    - "优惠"
    - "折扣"
    - "限时"
    - "免费领"
    - "扣1"
    - "需要的私"
    - "感兴趣的来"
    - "评论666"

  # --- 违禁物品类（社区规范 2.3节）---
  prohibited:
    - "翻墙软件"
    - "VPN"
    - "外挂程序"
    - "传销"
    - "假货"
    - "代购"

  # --- 色情低俗类（社区规范 2.4节）---
  vulgar:
    - "一夜情"
    - "性虐待"
    - "约炮"

# ==================== 二、功效暗示红线 ====================
# 核心违规逻辑：禁止以功效为噱头推荐/售卖/提供服务

efficacy_patterns:
  # 严格禁止的功效暗示表述
  forbidden:
    - "帮你"
    - "让你"
    - "教你（搭配迷信功效时）"
    - "化解"
    - "缓解"
    - "改善"
    - "提升XX运势"
    - "避免"
    - "招XX"
    - "挡XX"
    - "转运"
    - "开运"
    - "旺运"
    - "影响"
    - "不XX的话会YY"
    - "需要XX才能YY"
    - "我就是这样解决的"
    - "照着做就行"
    - "亲测有效"
    - "建议你XX"
    - "可以试试XX"
    - "记得XX"
    - "这样能XX"
    - "会带来XX"
    - "有助于XX"

  # 安全的替代表述
  safe_alternatives:
    - "我当时的选择是"
    - "我自己的体验"
    - "纯分享不推荐"
    - "只是记录"
    - "随便说说"
    - "仅供参考"
    - "我觉得有意思"
    - "挺准的（个人感受）"
    - "好玩"

# ==================== 三、导流行为禁止 ====================
# 社区规范 3.2节

anti_diversion:
  forbidden:
    - "手机号"
    - "微信号"
    - "邮箱"
    - "地址"
    - "网址链接"
    - "二维码"
    - "水印"
  safe:
    - "评论区互动引导"
    - "平台内搜索引导"
    - "个人主页简介（平台允许的范围内）"

# ==================== 四、谨慎词 ====================
# 可出现但不能高频堆砌，每条笔记不超过3次

caution_words:
  max_per_post: 3
  words:
    - "塔罗"
    - "星盘"
    - "合盘"
    - "水逆"
    - "八字"
    - "紫微"
    - "六爻"
    - "奇门"
    - "命盘"
    - "宫位"
    - "桃花运"

# ==================== 五、内容真实性 ====================

authenticity:
  forbidden_claims:
    - "亲身经历"
    - "亲测"
    - "真实故事"
    - "这是真事"
    - "100%准"
    - "必灵"
  safe_framing:
    - "创作/故事/代餐文学/情景模拟"
    - "沉浸感来自写作技巧，不来自真实性声明"

# ==================== 六、不当行为检测 ====================
# 社区规范 第4部分

behavior:
  unfriendly:
    - "人身攻击"
    - "恶意骚扰"
    - "标题党（首图血腥恐怖）"
    - "图文不符"
  fraud:
    - "编造名人谣言"
    - "违背科学常识"
  cheating:
    - "批量发布"
    - "高频发布"
    - "机器发布"
    - "刷粉"
    - "刷赞"
